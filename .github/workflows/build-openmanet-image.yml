name: Build OpenMANET Image

on:
  workflow_dispatch:
    inputs:
      openmanet_version:
        description: OpenMANET tag or branch to build
        required: false
        default: "1.6.5"
      board:
        description: OpenMANET board profile
        required: false
        default: "ekh-bcm2711"
      target:
        description: Firmware target suffix
        required: false
        default: "rpi4-mm6108-spi"
      jobs:
        description: Parallel OpenWrt make jobs inside Docker
        required: false
        default: "2"
      clean:
        description: Delete the cached OpenMANET source tree before building
        required: false
        type: boolean
        default: false
      rebuild_builder:
        description: Force a rebuild of the Docker builder image
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-openmanet-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Prepare OpenMANET cache directory
        run: mkdir -p .openmanet-cache

      - name: Restore OpenMANET build cache
        id: openmanet-cache
        uses: actions/cache/restore@v4
        with:
          path: .openmanet-cache
          key: openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-${{ hashFiles('easymanet/build.py', 'pyproject.toml', 'provisioning/**') }}
          restore-keys: |
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-

      - name: Build EasyMANET-flavored OpenMANET image
        id: build_image
        run: |
          set -euo pipefail
          args=(
            image build
            --output-dir dist
            --openmanet-version "${{ inputs.openmanet_version }}"
            --board "${{ inputs.board }}"
            --target "${{ inputs.target }}"
            --cache-dir .openmanet-cache
            --jobs "${{ inputs.jobs }}"
          )
          if [ "${{ inputs.clean }}" = "true" ]; then
            args+=(--clean)
          fi
          if [ "${{ inputs.rebuild_builder }}" = "true" ]; then
            args+=(--rebuild-builder)
          fi
          easymanet "${args[@]}"

      - name: Save OpenMANET build cache
        if: steps.build_image.outcome == 'success' && steps.openmanet-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .openmanet-cache
          key: ${{ steps.openmanet-cache.outputs.cache-primary-key }}

      - name: Upload firmware artifact
        if: steps.build_image.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openmanet-${{ inputs.openmanet_version }}-${{ inputs.target }}
          path: dist/*.img.gz
          retention-days: 7
          if-no-files-found: error
