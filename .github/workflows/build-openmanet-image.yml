name: Build OpenMANET Image

on:
  workflow_dispatch:
    inputs:
      openmanet_version:
        description: OpenMANET tag or branch to build
        required: false
        default: "1.6.5"
      board:
        description: OpenMANET board profile
        required: false
        default: "ekh-bcm2711"
      target:
        description: Firmware target suffix
        required: false
        default: "rpi4-mm6108-spi"
      jobs:
        description: Parallel make jobs inside Docker
        required: false
        default: "2"

permissions:
  contents: read

concurrency:
  group: build-openmanet-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Show Docker info
        run: |
          docker version
          docker info

      - name: Build EasyMANET-flavored OpenMANET image
        id: build_image
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: |
          python -m easymanet.cli image build \
            --clean \
            --rebuild-builder \
            --openmanet-version "${{ inputs.openmanet_version }}" \
            --board "${{ inputs.board }}" \
            --target "${{ inputs.target }}" \
            --jobs "${{ inputs.jobs }}"

      - name: Diagnose failed package builds
        if: steps.build_image.outcome == 'failure'
        run: |
          mkdir -p ci-logs
          docker run --rm \
            --platform linux/amd64 \
            --mount type=volume,source=easymanet-openmanet-firmware-cache,target=/cache \
            -v "${{ github.workspace }}/ci-logs:/logs" \
            easymanet-openmanet-builder:ubuntu24.04 \
            bash -lc '
              set -euo pipefail

              REPO_DIR=/cache/openmanet-firmware
              if [ ! -d "$REPO_DIR/.git" ]; then
                echo "Expected failed build tree at $REPO_DIR but it was missing" | tee /logs/diagnostic-setup.log
                exit 1
              fi

              cd "$REPO_DIR"

              status=0
              echo "=== Re-running full world with -j1 V=s from failed tree ===" | tee /logs/world_rerun.log
              if ! make -j1 V=s world 2>&1 | tee -a /logs/world_rerun.log; then
                status=1
              fi

              for target in \
                package/feeds/morse/hostapd_s1g/compile \
                package/feeds/openmanet/openmanetd/compile
              do
                pkg_name="$(echo "$target" | tr "/" "_")"
                log_path="/logs/${pkg_name}.log"
                echo "=== Running $target ===" | tee "$log_path"
                if ! make -j1 V=s "$target" 2>&1 | tee -a "$log_path"; then
                  status=1
                fi
              done

              exit "$status"
            '

      - name: Upload firmware artifact
        if: steps.build_image.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openmanet-${{ inputs.openmanet_version }}-${{ inputs.target }}
          path: dist/*.img.gz
          if-no-files-found: error

      - name: Upload diagnostic logs
        if: steps.build_image.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: openmanet-build-diagnostics-${{ inputs.openmanet_version }}-${{ inputs.target }}
          path: ci-logs/*.log
          if-no-files-found: error

      - name: Fail workflow if build failed
        if: steps.build_image.outcome == 'failure'
        run: exit 1
