name: Build OpenMANET Image

on:
  workflow_dispatch:
    inputs:
      openmanet_version:
        description: OpenMANET tag or branch to build
        required: false
        default: "1.6.5"
      board:
        description: OpenMANET board profile
        required: false
        default: "ekh-bcm2711"
      target:
        description: Firmware target suffix
        required: false
        default: "rpi4-mm6108-spi"
      jobs:
        description: Parallel make jobs inside Docker
        required: false
        default: "2"
      clean:
        description: Delete the cached OpenMANET source tree before building
        required: false
        type: boolean
        default: false
      rebuild_builder:
        description: Force rebuild of the Docker builder image
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-openmanet-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Prepare OpenMANET cache directory
        run: |
          mkdir -p .openmanet-cache/openmanet-firmware/dl
          mkdir -p .openmanet-cache/openmanet-firmware/staging_dir/host
          mkdir -p .openmanet-cache/openmanet-firmware/staging_dir/hostpkg
          mkdir -p .openmanet-cache/openmanet-firmware/build_dir/host
          mkdir -p .openmanet-cache/openmanet-firmware/build_dir/hostpkg

      - name: Restore OpenMANET build cache
        id: openmanet-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .openmanet-cache/openmanet-firmware/dl
            .openmanet-cache/openmanet-firmware/staging_dir/host
            .openmanet-cache/openmanet-firmware/staging_dir/hostpkg
            .openmanet-cache/openmanet-firmware/staging_dir/toolchain-*
            .openmanet-cache/openmanet-firmware/build_dir/host
            .openmanet-cache/openmanet-firmware/build_dir/hostpkg
          key: build-openmanet-image-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-${{ hashFiles('easymanet/build.py', 'pyproject.toml', 'provisioning/openwrt-overlay/**') }}
          restore-keys: |
            build-openmanet-image-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-
            build-openmanet-image-${{ runner.os }}-${{ inputs.board }}-

      - name: Show Docker info
        run: |
          docker version
          docker info

      - name: Build EasyMANET-flavored OpenMANET image
        id: build_image
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: |
          args=(
            --openmanet-version "${{ inputs.openmanet_version }}" \
            --board "${{ inputs.board }}" \
            --target "${{ inputs.target }}" \
            --jobs "${{ inputs.jobs }}" \
            --cache-dir "${{ github.workspace }}/.openmanet-cache"
          )
          if [ "${{ inputs.clean }}" = "true" ]; then
            args+=(--clean)
          fi
          if [ "${{ inputs.rebuild_builder }}" = "true" ]; then
            args+=(--rebuild-builder)
          fi
          python -m easymanet.cli image build "${args[@]}"

      - name: Diagnose failed package builds
        if: steps.build_image.outcome == 'failure'
        run: |
          mkdir -p ci-logs
          docker run --rm \
            --platform linux/amd64 \
            --mount type=bind,source="${{ github.workspace }}/.openmanet-cache",target=/cache \
            -v "${{ github.workspace }}/ci-logs:/logs" \
            easymanet-openmanet-builder:ubuntu24.04 \
            bash -lc '
              set -euo pipefail

              REPO_DIR=/cache/openmanet-firmware
              if [ ! -d "$REPO_DIR/.git" ]; then
                echo "Expected failed build tree at $REPO_DIR but it was missing" | tee /logs/diagnostic-setup.log
                exit 1
              fi

              cd "$REPO_DIR"

              status=0
              echo "=== Re-running full world with -j1 V=s from failed tree ===" | tee /logs/world_rerun.log
              if ! make -j1 V=s world 2>&1 | tee -a /logs/world_rerun.log; then
                status=1
              fi

              for target in \
                package/feeds/morse/hostapd_s1g/compile \
                package/feeds/openmanet/openmanetd/compile
              do
                pkg_name="$(echo "$target" | tr "/" "_")"
                log_path="/logs/${pkg_name}.log"
                echo "=== Running $target ===" | tee "$log_path"
                if ! make -j1 V=s "$target" 2>&1 | tee -a "$log_path"; then
                  status=1
                fi
              done

              exit "$status"
            '

      - name: Print diagnostic error summary
        if: steps.build_image.outcome == 'failure'
        run: |
          grep -RniE 'error:|fatal|undefined reference|cannot find|No .* found|command not found|make\[[0-9]+\]: \*\*\*' ci-logs \
            | grep -v 'echo "ERROR: module' \
            | head -n 120 || true

      - name: Save OpenMANET build cache
        if: always() && steps.openmanet-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .openmanet-cache/openmanet-firmware/dl
            .openmanet-cache/openmanet-firmware/staging_dir/host
            .openmanet-cache/openmanet-firmware/staging_dir/hostpkg
            .openmanet-cache/openmanet-firmware/staging_dir/toolchain-*
            .openmanet-cache/openmanet-firmware/build_dir/host
            .openmanet-cache/openmanet-firmware/build_dir/hostpkg
          key: ${{ steps.openmanet-cache.outputs.cache-primary-key }}

      - name: Upload firmware artifact
        if: steps.build_image.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openmanet-${{ inputs.openmanet_version }}-${{ inputs.target }}
          path: dist/*.img.gz
          if-no-files-found: error

      - name: Upload diagnostic logs
        if: steps.build_image.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: openmanet-build-diagnostics-${{ inputs.openmanet_version }}-${{ inputs.target }}
          path: ci-logs/*.log
          if-no-files-found: error

      - name: Fail workflow if build failed
        if: steps.build_image.outcome == 'failure'
        run: exit 1
