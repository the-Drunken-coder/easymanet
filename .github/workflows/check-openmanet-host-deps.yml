name: Check OpenMANET Host Deps

on:
  workflow_dispatch:
    inputs:
      openmanet_version:
        description: OpenMANET tag or branch to check against
        required: false
        default: "1.6.5"
      board:
        description: OpenMANET board profile
        required: false
        default: "ekh-bcm2711"

permissions:
  contents: read

concurrency:
  group: check-openmanet-host-deps-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Verify host-side OpenMANET deps
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Prepare OpenMANET cache directory
        run: |
          mkdir -p .openmanet-cache/openmanet-firmware/dl
          mkdir -p .openmanet-cache/openmanet-firmware/staging_dir/host
          mkdir -p .openmanet-cache/openmanet-firmware/staging_dir/hostpkg
          mkdir -p .openmanet-cache/openmanet-firmware/build_dir/host
          mkdir -p .openmanet-cache/openmanet-firmware/build_dir/hostpkg

      - name: Restore OpenMANET build cache
        id: openmanet-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .openmanet-cache/openmanet-firmware/dl
            .openmanet-cache/openmanet-firmware/staging_dir/host
            .openmanet-cache/openmanet-firmware/staging_dir/hostpkg
            .openmanet-cache/openmanet-firmware/staging_dir/toolchain-*
            .openmanet-cache/openmanet-firmware/build_dir/host
            .openmanet-cache/openmanet-firmware/build_dir/hostpkg
          key: openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-${{ hashFiles('easymanet/build.py', 'pyproject.toml', 'provisioning/openwrt-overlay/**') }}-${{ github.workflow }}-${{ github.run_id }}
          restore-keys: |
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-${{ hashFiles('easymanet/build.py', 'pyproject.toml', 'provisioning/openwrt-overlay/**') }}-
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-

      - name: Build Docker builder image
        env:
          PYTHONPATH: .
        run: |
          python - <<'PY'
          from easymanet.build import _ensure_builder_image, DEFAULT_BUILDER_IMAGE
          _ensure_builder_image(DEFAULT_BUILDER_IMAGE, force=True)
          print(DEFAULT_BUILDER_IMAGE)
          PY

      - name: Verify openmanetd host dependencies
        run: |
          mkdir -p ci-logs
          docker run --rm \
            --platform linux/amd64 \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            --mount type=bind,source="${{ github.workspace }}/.openmanet-cache",target=/cache \
            -v "${{ github.workspace }}/provisioning/openwrt-overlay:/overlay:ro" \
            -v "${{ github.workspace }}/ci-logs:/logs" \
            easymanet-openmanet-builder:ubuntu24.04 \
            bash -lc '
              set -euo pipefail

              REPO_DIR=/cache/openmanet-firmware
              HOST_UID="${HOST_UID:-0}"
              HOST_GID="${HOST_GID:-0}"
              export FORCE_UNSAFE_CONFIGURE=1
              cleanup_cache_ownership() {
                chown -R "$HOST_UID:$HOST_GID" \
                  /cache/openmanet-firmware/dl \
                  /cache/openmanet-firmware/staging_dir/host \
                  /cache/openmanet-firmware/staging_dir/hostpkg \
                  /cache/openmanet-firmware/staging_dir/toolchain-* \
                  /cache/openmanet-firmware/build_dir/host \
                  /cache/openmanet-firmware/build_dir/hostpkg \
                  2>/dev/null || true
              }
              trap cleanup_cache_ownership EXIT

              patch_openmanetd_alfred_pkg_config() {
                local makefile="$REPO_DIR/feeds/openmanet/openmanetd/Makefile"
                [ -f "$makefile" ] || return 0
                if grep -q 'PKG_CONFIG_LIBDIR=/usr/lib/x86_64-linux-gnu/pkgconfig' "$makefile"; then
                  return 0
                fi
                sed -i '"'"'s#$(MAKE) -C $(PKG_BUILD_DIR)/internal/alfred/alfred#PKG_CONFIG=/usr/bin/pkg-config PKG_CONFIG_LIBDIR=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig $(MAKE) -C $(PKG_BUILD_DIR)/internal/alfred/alfred#'"'"' "$makefile"
              }

              preserve_openwrt_cache() {
                local source_dir="$1"
                local snapshot_dir="$2"
                rm -rf "$snapshot_dir"
                mkdir -p "$snapshot_dir"
                for rel in dl staging_dir/host staging_dir/hostpkg build_dir/host build_dir/hostpkg; do
                  if [ -e "$source_dir/$rel" ]; then
                    mkdir -p "$snapshot_dir/$(dirname "$rel")"
                    mv "$source_dir/$rel" "$snapshot_dir/$rel"
                  fi
                done
                if [ -d "$source_dir/staging_dir" ]; then
                  mkdir -p "$snapshot_dir/staging_dir"
                  find "$source_dir/staging_dir" -maxdepth 1 -type d -name "toolchain-*" -exec mv {} "$snapshot_dir/staging_dir/" \;
                fi
              }

              restore_openwrt_cache() {
                local snapshot_dir="$1"
                local target_dir="$2"
                [ -d "$snapshot_dir" ] || return 0
                find "$snapshot_dir" -mindepth 1 -maxdepth 1 -exec mv {} "$target_dir/" \;
                rm -rf "$snapshot_dir"
              }

              if [ ! -d "$REPO_DIR/.git" ]; then
                CACHE_SNAPSHOT=/cache/openmanet-cache-snapshot
                rm -rf "$CACHE_SNAPSHOT"
                if [ -d "$REPO_DIR" ]; then
                  preserve_openwrt_cache "$REPO_DIR" "$CACHE_SNAPSHOT"
                  rm -rf "$REPO_DIR"
                fi
                git clone https://github.com/OpenMANET/firmware.git "$REPO_DIR"
                restore_openwrt_cache "$CACHE_SNAPSHOT" "$REPO_DIR"
              fi

              cd "$REPO_DIR"
              git fetch --tags origin
              git checkout "${{ inputs.openmanet_version }}"
              git submodule update --init --recursive

              mkdir -p files
              rm -rf files/etc/easymanet files/etc/uci-defaults/99-easymanet files/usr/lib/easymanet
              mkdir -p files/etc files/etc/uci-defaults files/usr/lib
              cp -R /overlay/* files/

              ./scripts/openmanet_setup.sh -i -b "${{ inputs.board }}"
              patch_openmanetd_alfred_pkg_config
              make package/feeds/openmanet/openmanetd/prepare V=s 2>&1 | tee /logs/openmanetd-prepare.log

              SRC_DIR="$(find build_dir -type d -path "*/openmanetd-*/internal/alfred/alfred" | sort | tail -n1)"
              if [ -z "$SRC_DIR" ]; then
                echo "Could not locate openmanetd alfred source directory after prepare" | tee /logs/alfred-host-build.log
                exit 1
              fi

              make -C "$SRC_DIR" 2>&1 | tee /logs/alfred-host-build.log
            '

      - name: Print host dependency error summary
        if: failure()
        run: |
          grep -RniE 'error:|fatal|undefined reference|cannot find|No .* found|command not found|make\[[0-9]+\]: \*\*\*' ci-logs \
            | grep -v 'echo "ERROR: module' \
            | head -n 120 || true

      - name: Upload host dependency logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openmanet-host-deps-${{ inputs.openmanet_version }}
          path: ci-logs/*.log
          if-no-files-found: warn
