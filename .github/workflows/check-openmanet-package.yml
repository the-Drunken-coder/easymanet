name: Check OpenMANET Package

on:
  workflow_dispatch:
    inputs:
      openmanet_version:
        description: OpenMANET tag or branch to build against
        required: false
        default: "1.6.5"
      board:
        description: OpenMANET board profile
        required: false
        default: "ekh-bcm2711"
      package_target:
        description: OpenWrt make target to compile
        required: false
        default: "package/feeds/openmanet/openmanetd/compile"
      jobs:
        description: Parallel OpenWrt make jobs for bootstrap steps
        required: false
        default: "2"

permissions:
  contents: read

concurrency:
  group: check-openmanet-package-${{ github.ref }}-${{ inputs.package_target }}
  cancel-in-progress: false

jobs:
  check:
    name: Compile selected package
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install OpenMANET build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex g++ gawk gcc-multilib g++-multilib git gettext \
            libncurses5-dev libssl-dev python3-setuptools rsync unzip golang-go zlib1g-dev swig file wget \
            libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libgps-dev libcap-dev pkg-config libopus-dev \
            libopusfile-dev portaudio19-dev net-tools libpcre3-dev libpcre3 upx-ucl zstd

      - name: Clone OpenMANET firmware
        run: |
          git clone https://github.com/OpenMANET/firmware.git openmanet-firmware
          cd openmanet-firmware
          git fetch --tags origin
          git checkout "${{ inputs.openmanet_version }}"
          git submodule update --init --recursive

      - name: Restore OpenMANET build cache
        id: openmanet-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            openmanet-firmware/dl
            openmanet-firmware/staging_dir/host
            openmanet-firmware/staging_dir/hostpkg
            openmanet-firmware/build_dir/host
            openmanet-firmware/build_dir/hostpkg
          key: openmanet-package-native-v2-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-${{ github.workflow }}-${{ github.run_id }}
          restore-keys: |
            openmanet-package-native-v2-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-
            openmanet-package-native-v2-${{ runner.os }}-${{ inputs.board }}-

      - name: Compile selected OpenMANET package
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          cd openmanet-firmware

          requested_jobs="${{ inputs.jobs }}"
          available_jobs="$(nproc)"
          if [ "$requested_jobs" -gt "$available_jobs" ]; then
            build_jobs="$available_jobs"
          else
            build_jobs="$requested_jobs"
          fi
          echo "Using $build_jobs bootstrap make jobs on $available_jobs available CPUs"

          echo "=== Configure ${{ inputs.board }} ===" | tee "${{ github.workspace }}/ci-logs/package-check.log"
          ./scripts/openmanet_setup.sh -i -b "${{ inputs.board }}" 2>&1 | tee -a "${{ github.workspace }}/ci-logs/package-check.log"

          echo "=== Disk before package bootstrap ===" | tee -a "${{ github.workspace }}/ci-logs/package-check.log"
          df -h 2>&1 | tee -a "${{ github.workspace }}/ci-logs/package-check.log"

          echo "=== Build package prerequisites ===" | tee -a "${{ github.workspace }}/ci-logs/package-check.log"
          make -j"$build_jobs" tools/install toolchain/install target/linux/compile 2>&1 | tee "${{ github.workspace }}/ci-logs/bootstrap.log"

          echo "=== Disk before package compile ===" | tee -a "${{ github.workspace }}/ci-logs/package-check.log"
          df -h 2>&1 | tee -a "${{ github.workspace }}/ci-logs/package-check.log"

          echo "=== Compile ${{ inputs.package_target }} ===" | tee -a "${{ github.workspace }}/ci-logs/package-check.log"
          make -j1 V=s "${{ inputs.package_target }}" 2>&1 | tee -a "${{ github.workspace }}/ci-logs/package-check.log"

      - name: Print package error summary
        if: failure()
        run: |
          grep -RniE 'error:|fatal|undefined reference|cannot find|No .* found|command not found|make\[[0-9]+\]: \*\*\*' ci-logs \
            | grep -v 'echo "ERROR: module' \
            | head -n 120 || true

      - name: Save OpenMANET build cache
        if: success() && steps.openmanet-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            openmanet-firmware/dl
            openmanet-firmware/staging_dir/host
            openmanet-firmware/staging_dir/hostpkg
            openmanet-firmware/build_dir/host
            openmanet-firmware/build_dir/hostpkg
          key: ${{ steps.openmanet-cache.outputs.cache-primary-key }}

      - name: Upload package compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openmanet-package-check-${{ inputs.openmanet_version }}
          path: ci-logs/*.log
          if-no-files-found: warn
