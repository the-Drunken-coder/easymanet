name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: python -c "import easymanet; from easymanet.cli import app"

      - name: Run unit tests
        run: pytest -q

      - name: Syntax-check overlay shell scripts
        run: find provisioning/openwrt-overlay -name '*.sh' -print0 | xargs -0 sh -n

      - name: Verify overlay files are packaged
        run: python scripts/verify_overlay_packaging.py

  docker-build-smoke:
    name: Docker build smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Docker builder image
        run: |
          python -c "from easymanet.build import _ensure_builder_image; _ensure_builder_image('easymanet-openmanet-builder:ci')"

      - name: Syntax-check generated container build script
        run: |
          python - <<'PY'
          import subprocess
          import tempfile
          from pathlib import Path

          from easymanet.build import (
              DEFAULT_BOARD,
              DEFAULT_OPENMANET_REPO,
              DEFAULT_OPENMANET_VERSION,
              DEFAULT_TARGET,
              _container_script,
          )

          script = _container_script(
              repo_url=DEFAULT_OPENMANET_REPO,
              openmanet_version=DEFAULT_OPENMANET_VERSION,
              board=DEFAULT_BOARD,
              target=DEFAULT_TARGET,
              jobs=4,
              clean=False,
              extra_packages=["iperf3"],
          )
          with tempfile.NamedTemporaryFile("w", suffix=".sh", delete=False) as handle:
              handle.write(script)
              path = Path(handle.name)
          try:
              subprocess.run(["bash", "-n", str(path)], check=True)
          finally:
              path.unlink(missing_ok=True)
          PY
