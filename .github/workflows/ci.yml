name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: python -c "import easymanet, easymanet_cli, easymanet_image, easymanet_desktop, easymanet_publish; from easymanet_cli.app import app"

      - name: Check release version alignment
        run: |
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          import easymanet

          pyproject_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          package_version = easymanet.__version__
          electron_version = json.loads(Path("apps/desktop/electron/package.json").read_text())["version"]
          versions = {
              "pyproject.toml": pyproject_version,
              "installed easymanet package": package_version,
              "apps/desktop/electron/package.json": electron_version,
          }
          if len(set(versions.values())) != 1:
              details = ", ".join(f"{path}={version}" for path, version in versions.items())
              raise SystemExit(f"Release versions are not aligned: {details}")
          print(f"Release versions aligned: {pyproject_version}")
          PY

      - name: Check Electron desktop shell
        run: |
          npm ci --prefix apps/desktop/electron
          EASYMANET_PYTHON=python npm --prefix apps/desktop/electron run check

      - name: Run unit tests
        run: pytest -q --cov=easymanet --cov-report=term-missing --cov-fail-under=50

      - name: Syntax-check overlay shell scripts
        run: |
          find images/openmanet/provisioning/openwrt-overlay \
            \( -name '*.sh' -o -path '*/etc/init.d/*' -o -path '*/etc/uci-defaults/*' \) \
            -type f -print0 | xargs -0 sh -n

      - name: Verify overlay files are packaged
        run: python tools/packaging/verify_overlay_packaging.py

  docker-build-smoke:
    name: Docker build smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Docker builder image
        run: |
          python -c "from easymanet_image.build import _ensure_builder_image; _ensure_builder_image('easymanet-openmanet-builder:ci')"

      - name: Syntax-check generated container build script
        run: |
          python - <<'PY'
          import subprocess
          import tempfile
          from pathlib import Path

          from easymanet_image.build import (
              DEFAULT_BOARD,
              DEFAULT_OPENMANET_REPO,
              DEFAULT_OPENMANET_VERSION,
              DEFAULT_TARGET,
              _container_script,
          )

          script = _container_script(
              repo_url=DEFAULT_OPENMANET_REPO,
              openmanet_version=DEFAULT_OPENMANET_VERSION,
              board=DEFAULT_BOARD,
              target=DEFAULT_TARGET,
              jobs=4,
              clean=False,
              extra_packages=["iperf3"],
          )
          with tempfile.NamedTemporaryFile("w", suffix=".sh", delete=False) as handle:
              handle.write(script)
              path = Path(handle.name)
          try:
              subprocess.run(["bash", "-n", str(path)], check=True)
          finally:
              path.unlink(missing_ok=True)
          PY
