name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: python -c "import easymanet; from easymanet.cli import app"

      - name: Run unit tests
        run: pytest -q

      - name: Syntax-check overlay shell scripts
        run: find provisioning/openwrt-overlay -name '*.sh' -print0 | xargs -0 sh -n

      - name: Verify overlay files are packaged
        run: python scripts/verify_overlay_packaging.py
