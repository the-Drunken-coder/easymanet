name: Prove Overlay Weekly

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      openmanet_version:
        description: OpenMANET tag or branch to build
        required: false
        default: "1.6.5"
      board:
        description: OpenMANET board profile
        required: false
        default: "ekh-bcm2711"
      target:
        description: Firmware target suffix
        required: false
        default: "rpi4-mm6108-spi"
      jobs:
        description: Parallel OpenWrt make jobs inside Docker
        required: false
        default: "2"

permissions:
  contents: read

jobs:
  prove:
    name: Weekly overlay prove build
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune --all --force

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare OpenMANET cache directory
        run: mkdir -p .openmanet-cache

      - name: Restore OpenMANET build cache
        id: openmanet-cache
        uses: actions/cache/restore@v4
        with:
          path: .openmanet-cache
          key: openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board || 'ekh-bcm2711' }}-${{ inputs.openmanet_version || '1.6.5' }}-${{ hashFiles('easymanet/build.py', 'pyproject.toml', 'provisioning/**') }}
          restore-keys: |
            openmanet-docker-cache-v1-${{ runner.os }}-

      - name: Build EasyMANET-flavored OpenMANET image
        run: |
          easymanet image build \
            --output-dir dist \
            --openmanet-version "${{ inputs.openmanet_version || '1.6.5' }}" \
            --board "${{ inputs.board || 'ekh-bcm2711' }}" \
            --target "${{ inputs.target || 'rpi4-mm6108-spi' }}" \
            --cache-dir .openmanet-cache \
            --jobs "${{ inputs.jobs || '2' }}"

      - name: Save OpenMANET build cache
        if: steps.openmanet-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .openmanet-cache
          key: ${{ steps.openmanet-cache.outputs.cache-primary-key }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmanet-weekly-${{ inputs.openmanet_version || '1.6.5' }}-${{ inputs.target || 'rpi4-mm6108-spi' }}
          path: dist/*.img.gz
          retention-days: 7
          if-no-files-found: error
