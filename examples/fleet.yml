version: 1

mesh:
  id: easymanet-field
  password: "change-this-mesh-password"
  channel: 42
  bandwidth_mhz: 2
  country: US

defaults:
  target: rpi4-mm6108-spi

  local_ap:
    enabled: true
    password: "change-this-local-password"

  management:
    root_password_hash: ""
    ssh_authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKm8abcdefgh"

nodes:
  manet01:
    role: gate
    hostname: manet01
    ip: 10.41.1.1

    local_ap:
      ssid: manet01-local

    gateway:
      enabled: true
      uplink_interface: eth0

  manet02:
    role: point
    hostname: manet02
    ip: 10.41.2.1

    local_ap:
      ssid: manet02-local

  manet03:
    role: point
    hostname: manet03
    ip: 10.41.3.1

    local_ap:
      ssid: manet03-local
