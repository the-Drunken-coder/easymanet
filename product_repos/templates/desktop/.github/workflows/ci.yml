name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Desktop checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/electron/package-lock.json

      - name: Install desktop dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          npm --prefix apps/desktop/electron ci

      - name: Check generated desktop surface
        run: |
          python scripts/check_desktop_surface.py
          pytest -q tests/test_desktop.py
          npm --prefix apps/desktop/electron run check
