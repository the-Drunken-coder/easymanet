name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create. Leave blank to upload workflow artifacts only.
        required: false
        default: ""
      source_repo:
        description: Authoring repository that generated this release
        required: false
        default: "unknown"
      source_ref:
        description: Authoring repository ref
        required: false
        default: "unknown"
      source_sha:
        description: Authoring repository commit SHA
        required: false
        default: "unknown"

permissions:
  contents: write

jobs:
  build:
    name: Build desktop app (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            label: macos
            artifact_name: macos
            build_args: --mac dmg zip
          - runner: windows-2022
            label: windows
            artifact_name: windows
            build_args: --win nsis zip

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/electron/package-lock.json

      - name: Install desktop build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller
          npm --prefix apps/desktop/electron ci

      - name: Run desktop checks
        shell: bash
        env:
          PYTHON: python
        run: |
          python scripts/check_desktop_surface.py
          pytest -q tests/test_desktop.py
          npm --prefix apps/desktop/electron run check

      - name: Build packaged desktop artifacts
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          PYTHON: python
        run: |
          npm --prefix apps/desktop/electron run dist -- ${{ matrix.build_args }}

      - name: Generate platform artifact manifest
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          PLATFORM_LABEL: ${{ matrix.label }}
        run: |
          python - <<'PY'
          import datetime as dt
          import hashlib
          import json
          import os
          from pathlib import Path

          dist = Path("apps/desktop/electron/dist")
          suffixes = (".dmg", ".zip", ".exe")
          artifacts = []
          for path in sorted(dist.iterdir()):
              if not path.is_file() or not path.name.endswith(suffixes):
                  continue
              artifacts.append(
                  {
                      "name": path.name,
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      "bytes": path.stat().st_size,
                  }
              )
          if not artifacts:
              raise SystemExit("No packaged desktop artifacts were produced")

          manifest = {
              "schema_version": 1,
              "generated_at": dt.datetime.now(dt.timezone.utc).isoformat(),
              "platform": os.environ["PLATFORM_LABEL"],
              "release_tag": os.environ["RELEASE_TAG"],
              "source_repo": os.environ["SOURCE_REPO"],
              "source_ref": os.environ["SOURCE_REF"],
              "source_sha": os.environ["SOURCE_SHA"],
              "public_repo": os.environ["GITHUB_REPOSITORY"],
              "public_sha": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "artifacts": artifacts,
          }
          output = dist / f"easymanet-desktop-{os.environ['PLATFORM_LABEL']}-manifest.json"
          output.write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - name: Upload platform artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: easymanet-desktop-${{ matrix.artifact_name }}
          path: |
            apps/desktop/electron/dist/*.dmg
            apps/desktop/electron/dist/*.zip
            apps/desktop/electron/dist/*.exe
            apps/desktop/electron/dist/easymanet-desktop-*-manifest.json
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish desktop artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          pattern: easymanet-desktop-*
          path: release-dist
          merge-multiple: true

      - name: Upload combined release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: easymanet-desktop-release
          path: release-dist/*
          retention-days: 14
          if-no-files-found: error

      - name: Create GitHub release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          {
            echo "EasyMANET desktop packaged release."
            echo
            echo "Includes macOS and Windows Electron artifacts with a bundled Python bridge."
            echo "Disk discovery and flashing flows still rely on the current macOS/Linux backend support."
            echo
            echo "Generated from ${SOURCE_REPO}@${SOURCE_REF} (${SOURCE_SHA})."
          } > "$notes"
          gh release create "$RELEASE_TAG" release-dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TAG" \
            --notes-file "$notes"
