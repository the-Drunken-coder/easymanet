name: Image Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create. Leave blank to upload workflow artifacts only.
        required: false
        default: ""
      openmanet_version:
        description: OpenMANET tag or branch to build
        required: false
        default: "1.6.5"
      board:
        description: OpenMANET board profile
        required: false
        default: "ekh-bcm2711"
      target:
        description: Firmware target suffix
        required: false
        default: "rpi4-mm6108-spi"
      channel:
        description: "Release channel: stable or candidate. Leave blank to derive from release_tag."
        required: false
        default: ""
      jobs:
        description: Parallel OpenWrt make jobs inside Docker
        required: false
        default: "2"
      clean:
        description: Delete cached OpenMANET source before building
        required: false
        type: boolean
        default: false
      source_repo:
        description: Authoring repository that generated this release
        required: false
        default: "unknown"
      source_ref:
        description: Authoring repository ref
        required: false
        default: "unknown"
      source_sha:
        description: Authoring repository commit SHA
        required: false
        default: "unknown"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware image
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Prepare OpenMANET cache directory
        run: mkdir -p .openmanet-cache

      - name: Restore OpenMANET build cache
        id: openmanet-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .openmanet-cache
          key: openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-${{ hashFiles('easymanet/build.py', 'packages/image/src/easymanet_image/build.py', 'pyproject.toml', 'provisioning/extra-packages.txt', 'images/openmanet/provisioning/extra-packages.txt', 'provisioning/openwrt-overlay/**', 'images/openmanet/provisioning/openwrt-overlay/**') }}
          restore-keys: |
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-

      - name: Build EasyMANET-flavored OpenMANET image
        id: build_image
        env:
          OPENMANET_VERSION: ${{ inputs.openmanet_version }}
          BOARD: ${{ inputs.board }}
          TARGET: ${{ inputs.target }}
          JOBS: ${{ inputs.jobs }}
          CLEAN: ${{ inputs.clean }}
        run: |
          set -euo pipefail
          case "$OPENMANET_VERSION" in (""|*[!A-Za-z0-9._/-]*) echo "Invalid openmanet_version"; exit 1;; esac
          case "$BOARD" in (""|*[!A-Za-z0-9._-]*) echo "Invalid board"; exit 1;; esac
          case "$TARGET" in (""|*[!A-Za-z0-9._-]*) echo "Invalid target"; exit 1;; esac
          case "$JOBS" in (""|*[!0-9]*) echo "Invalid jobs"; exit 1;; esac
          if [ "$JOBS" -lt 1 ]; then
            echo "Invalid jobs"
            exit 1
          fi
          args=(
            image build
            --output-dir dist
            --openmanet-version "$OPENMANET_VERSION"
            --board "$BOARD"
            --target "$TARGET"
            --cache-dir .openmanet-cache
            --jobs "$JOBS"
          )
          if [ "$CLEAN" = "true" ]; then
            args+=(--clean)
          fi
          easymanet "${args[@]}"

      - name: Resolve release channel
        id: release_channel
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          channel="$INPUT_CHANNEL"
          if [ -z "$channel" ]; then
            case "$RELEASE_TAG" in
              images-v*-candidate.*) channel="candidate" ;;
              images-v*) channel="stable" ;;
              "") channel="candidate" ;;
              *) echo "release_tag must look like images-vX.Y.Z or images-vX.Y.Z-candidate.N"; exit 1 ;;
            esac
          fi
          case "$channel" in stable|candidate) ;; *) echo "channel must be stable or candidate"; exit 1 ;; esac
          if [ -n "$RELEASE_TAG" ]; then
            if [ "$channel" = "stable" ] && ! printf '%s\n' "$RELEASE_TAG" | grep -Eq '^images-v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "stable image release tags must look like images-vX.Y.Z"
              exit 1
            fi
            if [ "$channel" = "candidate" ] && ! printf '%s\n' "$RELEASE_TAG" | grep -Eq '^images-v[0-9]+\.[0-9]+\.[0-9]+-candidate\.[0-9]+$'; then
              echo "candidate image release tags must look like images-vX.Y.Z-candidate.N"
              exit 1
            fi
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Save OpenMANET build cache
        if: steps.build_image.outcome == 'success' && steps.openmanet-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .openmanet-cache
          key: ${{ steps.openmanet-cache.outputs.cache-primary-key }}

      - name: Generate release manifest
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          OPENMANET_VERSION: ${{ inputs.openmanet_version }}
          BOARD: ${{ inputs.board }}
          TARGET: ${{ inputs.target }}
          CHANNEL: ${{ steps.release_channel.outputs.channel }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path
          from easymanet_image.release import IMAGE_RELEASE_MANIFEST, write_release_manifest

          dist = Path("dist")
          artifacts = []
          for path in sorted(dist.glob("*.img.gz")):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              sha_path = path.with_suffix(path.suffix + ".sha256")
              sha_path.write_text(f"{digest}  {path.name}\n")
              artifacts.append(path)

          if not artifacts:
              raise SystemExit("No firmware artifacts (*.img.gz) were produced")

          artifact = artifacts[0]
          write_release_manifest(
              artifact=artifact,
              output_dir=dist,
              target=os.environ["TARGET"],
              openmanet_version=os.environ["OPENMANET_VERSION"],
              board=os.environ["BOARD"],
              channel=os.environ["CHANNEL"],
              release_tag=os.environ["RELEASE_TAG"],
              source_repo=os.environ["SOURCE_REPO"],
              source_ref=os.environ["SOURCE_REF"],
              source_sha=os.environ["SOURCE_SHA"],
              public_repo=os.environ["GITHUB_REPOSITORY"],
              public_repo_commit=os.environ["GITHUB_SHA"],
              workflow_name=os.environ["GITHUB_WORKFLOW"],
              run_id=os.environ["GITHUB_RUN_ID"],
              signature_assets=[f"{artifact.name}.sha256", f"{IMAGE_RELEASE_MANIFEST}.sigstore.json"],
          )
          PY

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: |
            dist/*.img.gz
            dist/*.sha256
            dist/easymanet-image-release.json

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9

      - name: Sign release manifest
        run: |
          cosign sign-blob --yes --bundle dist/easymanet-image-release.json.sigstore.json dist/easymanet-image-release.json

      - name: Generate release notes
        if: inputs.release_tag != ''
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_RELEASE_NOTES_MODEL: ${{ vars.OPENAI_RELEASE_NOTES_MODEL || 'gpt-5.4-mini' }}
          IMAGE_MANIFEST: dist/easymanet-image-release.json
          RELEASE_NOTES: dist/release-notes.md
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY is not configured; fallback release notes will be used."
            exit 0
          fi
          python tools/packaging/generate_image_release_notes.py

      - name: Fallback release notes
        if: inputs.release_tag != ''
        run: |
          if [ ! -s dist/release-notes.md ]; then
            {
              printf '%s\n' '## User Summary'
              printf '%s\n\n' 'EasyMANET firmware image release.'
              printf '%s\n' '## Technical Appendix'
              printf '%s\n' 'See easymanet-image-release.json and attached checksums/signatures.'
            } > dist/release-notes.md
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: easymanet-image-${{ inputs.openmanet_version }}-${{ inputs.target }}
          path: |
            dist/*.img.gz
            dist/*.sha256
            dist/easymanet-image-release.json
            dist/easymanet-image-release.json.sigstore.json
            dist/release-notes.md
          retention-days: 14
          if-no-files-found: error

      - name: Create GitHub release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          OPENMANET_VERSION: ${{ inputs.openmanet_version }}
          TARGET: ${{ inputs.target }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          CHANNEL: ${{ steps.release_channel.outputs.channel }}
        run: |
          set -euo pipefail
          args=(release create "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes-file dist/release-notes.md)
          if [ "$CHANNEL" = "candidate" ]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

      - name: Clean up old image releases
        if: inputs.release_tag != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python tools/packaging/cleanup_image_releases.py --repo "$GITHUB_REPOSITORY" --just-published "${{ inputs.release_tag }}"
