name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Monorepo source ref being published
        required: false

permissions:
  contents: read

jobs:
  build-desktop:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.source_ref || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build desktop distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install dist/*.whl
          easymanet-desktop --help
          npm ci --prefix apps/desktop/electron
          EASYMANET_PYTHON=python npm --prefix apps/desktop/electron run check

      - name: Upload desktop distribution
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easymanet-desktop
          path: dist/*
          if-no-files-found: error
